# Import other goss.yaml files
command:
  grafana-application-configuration:
    exec: juju status -m {{ .Vars.model_name }} grafana --format=json
    exit-status: 0
    stdout:
      gjson:
        applications.grafana.scale: {gt: 0}
        applications.grafana.application-status.current: active
        applications.grafana.units.*.juju-status.current: idle
        applications.grafana.units.*.workload-status.current: active
    stderr: ""

  grafana-external-url:
    exec: curl -s http://$(juju status -m {{ .Vars.model_name }} --format=json | jq -r '.applications["grafana"].units[].address'):3000/api/health
    exit-status: 0
    stdout:
      gjson:
        database: "ok"
    stderr: ""
